<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Flashcards Set 2 (101-200)</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Load Inter Font & Noto Sans KR */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        /* 3D Flip Effect Styles */
        .card-container {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            padding: 2rem;
        }

        .card-front {
            background-color: white;
            color: #1F2937; /* gray-800 */
            border: 2px solid #E5E7EB;
        }

        .card-back {
            background-color: #059669; /* Emerald-600 (Different color for Set 2) */
            color: white;
            transform: rotateY(180deg);
        }
    </style>
</head>

            { word: "Ensure", ipa: "/ɪnˈʃʊə/", meaning: "보장하다, 확실하게 하다", sentence: "Please ensure that the door is locked.", translation: "문이 잠겼는지 확실히 해주세요." },
            { word: "Entity", ipa: "/ˈɛntɪti/", meaning: "실체, 독립체", sentence: "The company is a separate legal entity.", translation: "그 회사는 별도의 법인체이다." },
            { word: "Environment", ipa: "/ɪnˈvaɪərənmənt/", meaning: "환경", sentence: "We must protect the environment.", translation: "우리는 환경을 보호해야 한다." },
            { word: "Equate", ipa: "/ɪˈkweɪt/", meaning: "동일시하다", sentence: "You cannot equate wealth with happiness.", translation: "부를 행복과 동일시할 수는 없다." },
            { word: "Equip", ipa: "/ɪˈkwɪp/", meaning: "장비를 갖추다", sentence: "The lab is equipped with modern tools.", translation: "그 실험실은 현대적인 도구를 갖추고 있다." },
            { word: "Equivalent", ipa: "/ɪˈkwɪvələnt/", meaning: "동등한, 상당하는 것", sentence: "One dollar is equivalent to 100 cents.", translation: "1달러는 100센트와 동등하다." },
            { word: "Error", ipa: "/ˈɛrə/", meaning: "오류, 실수", sentence: "There is an error in your calculation.", translation: "당신의 계산에 오류가 있다." },
            { word: "Establish", ipa: "/ɪˈstæblɪʃ/", meaning: "설립하다, 확립하다", sentence: "The company was established in 1990.", translation: "그 회사는 1990년에 설립되었다." },
            { word: "Estimate", ipa: "/ˈɛstɪmət/", meaning: "추정하다, 견적", sentence: "We estimate the cost to be $500.", translation: "우리는 비용을 500달러로 추정한다." },
            { word: "Ethic", ipa: "/ˈɛθɪk/", meaning: "윤리, 도덕", sentence: "Work ethic is important in this job.", translation: "이 직업에서는 직업 윤리가 중요하다." },
            { word: "Evaluate", ipa: "/ɪˈvæljʊeɪt/", meaning: "평가하다", sentence: "Teachers evaluate students' progress.", translation: "교사들은 학생들의 진전을 평가한다." },
            { word: "Eventual", ipa: "/ɪˈvɛntʃʊəl/", meaning: "궁극적인, 최종적인", sentence: "The eventual winner was Brazil.", translation: "최종 우승자는 브라질이었다." },
            { word: "Evident", ipa: "/ˈɛvɪdənt/", meaning: "분명한, 명백한", sentence: "It was evident that she was tired.", translation: "그녀가 피곤하다는 것은 분명했다." },
            { word: "Evolve", ipa: "/ɪˈvɒlv/", meaning: "진화하다, 발전하다", sentence: "The company has evolved over the years.", translation: "그 회사는 수년에 걸쳐 발전해 왔다." },
            { word: "Exceed", ipa: "/ɪkˈsiːd/", meaning: "초과하다, 넘어서다", sentence: "Do not exceed the speed limit.", translation: "속도 제한을 초과하지 마시오." },
            { word: "Exclude", ipa: "/ɪkˈskluːd/", meaning: "제외하다, 배제하다", sentence: "The price excludes tax.", translation: "가격에는 세금이 제외되어 있다." },
            { word: "Exhibit", ipa: "/ɪɡˈzɪbɪt/", meaning: "전시하다, 보이다", sentence: "They will exhibit their art in Paris.", translation: "그들은 파리에서 예술품을 전시할 것이다." },
            { word: "Expand", ipa: "/ɪkˈspænd/", meaning: "확장하다, 넓히다", sentence: "The business is expanding rapidly.", translation: "사업이 빠르게 확장되고 있다." },
            { word: "Expert", ipa: "/ˈɛkspɜːt/", meaning: "전문가", sentence: "He is an expert in computer science.", translation: "그는 컴퓨터 과학 전문가이다." },
            { word: "Explicit", ipa: "/ɪkˈsplɪsɪt/", meaning: "명백한, 노골적인", sentence: "He gave me explicit instructions.", translation: "그는 나에게 명백한 지시를 내렸다." },
            { word: "Expose", ipa: "/ɪkˈspəʊz/", meaning: "드러내다, 폭로하다", sentence: "The report exposed the scandal.", translation: "그 보고서는 스캔들을 폭로했다." },
            { word: "External", ipa: "/ɛkˈstɜːnᵊl/", meaning: "외부의", sentence: "This is for external use only.", translation: "이것은 외용 전용이다." },
            { word: "Extract", ipa: "/ˈɛkstrækt/", meaning: "추출하다, 발췌", sentence: "They extract oil from the ground.", translation: "그들은 땅에서 석유를 추출한다." },
            { word: "Facilitate", ipa: "/fəˈsɪlɪteɪt/", meaning: "용이하게 하다, 촉진하다", sentence: "The new tool facilitates learning.", translation: "새로운 도구는 학습을 용이하게 한다." },
            { word: "Factor", ipa: "/ˈfæktə/", meaning: "요인, 요소", sentence: "Price is a key factor in the decision.", translation: "가격은 결정의 핵심 요인이다." },
            { word: "Feature", ipa: "/ˈfiːtʃə/", meaning: "특징, 특색", sentence: "The car has many safety features.", translation: "그 차는 많은 안전 기능을 갖추고 있다." }
        ];

        let currentCardIndex = 0;
        let shuffledVocabulary = [...vocabulary]; // Clone the original array

        // Get DOM elements
        const cardContainer = document.getElementById('flashcard-container');
        const frontWordEl = document.getElementById('front-word');
        const frontIpaEl = document.getElementById('front-ipa'); // New IPA Element
        const backMeaningEl = document.getElementById('back-meaning');
        const backSentenceEl = document.getElementById('back-sentence');
        const backTranslationEl = document.getElementById('back-translation');
        const cardCounterEl = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');

        // Function to load card content
        function loadCard(index) {
            if (index < 0 || index >= shuffledVocabulary.length) return;

            currentCardIndex = index;
            const cardData = shuffledVocabulary[index];

            // Update Card Front
            frontWordEl.textContent = cardData.word;
            frontIpaEl.textContent = cardData.ipa; // Set IPA

            // Update Card Back
            backMeaningEl.textContent = cardData.meaning;
            backSentenceEl.textContent = cardData.sentence;
            backTranslationEl.textContent = cardData.translation;

            // Update counter 
            cardCounterEl.textContent = `Card ${index + 1} / ${shuffledVocabulary.length}`;

            // Reset card to front face
            cardContainer.classList.remove('is-flipped');
        }

        // Function to flip card
        function flipCard() {
            cardContainer.classList.toggle('is-flipped');
        }

        // Show next card
        function nextCard() {
            const nextIndex = (currentCardIndex + 1) % shuffledVocabulary.length;
            loadCard(nextIndex);
        }

        // Show previous card
        function prevCard() {
            const prevIndex = (currentCardIndex - 1 + shuffledVocabulary.length) % shuffledVocabulary.length;
            loadCard(prevIndex);
        }

        // Shuffle cards (Fisher-Yates algorithm)
        function shuffleCards() {
            let m = shuffledVocabulary.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = shuffledVocabulary[m];
                shuffledVocabulary[m] = shuffledVocabulary[i];
                shuffledVocabulary[i] = t;
            }
            loadCard(0);
        }

        // Event Listeners
        cardContainer.addEventListener('click', flipCard);
        nextBtn.addEventListener('click', nextCard);
        prevBtn.addEventListener('click', prevCard);
        shuffleBtn.addEventListener('click', shuffleCards);

        // On page load, shuffle and display the first card
        shuffleCards();
        loadCard(0);
    </script>
</body>
</html>
